<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍱 公司午餐點餐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --bg: #FDF6ED;
    --surface: #FFFAF4;
    --card: #FFFFFF;
    --primary: #C0392B;
    --primary-light: #E74C3C;
    --accent: #E8A838;
    --accent2: #2980B9;
    --text: #1A1A1A;
    --text2: #555;
    --text3: #888;
    --border: #E8D5B7;
    --green: #27AE60;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--primary);
    color: white;
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(192,57,43,0.3);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .header h1 { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
  .header .date { font-size: 12px; opacity: 0.8; }
  .header .my-name-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    position: relative;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab .badge {
    position: absolute;
    top: 6px;
    right: 8px;
    background: var(--primary);
    color: white;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    min-width: 18px;
  }

  /* ── NAME MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 88%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .modal input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--primary); }
  .btn-primary {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn-primary:active { background: var(--primary-light); }

  /* ── SECTION ── */
  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  /* ── STORE SELECTOR ── */
  .store-selector {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .store-selector h3 { font-size: 14px; color: var(--text3); margin-bottom: 12px; font-weight: 500; }
  .store-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .store-btn {
    border: 2px solid var(--border);
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.2s;
    color: var(--text2);
  }
  .store-btn.active { border-color: var(--primary); background: #FEF0EE; color: var(--primary); }
  .store-btn .emoji { font-size: 20px; display: block; margin-bottom: 2px; }

  /* ── CATEGORY ── */
  .category-title {
    font-size: 16px;
    font-weight: 900;
    color: var(--primary);
    padding: 14px 0 8px;
    border-bottom: 2px solid var(--primary);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  /* ── MENU ITEM ── */
  .menu-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: box-shadow 0.2s;
  }
  .menu-item.selected {
    border-color: var(--primary);
    box-shadow: 0 2px 12px rgba(192,57,43,0.15);
    background: #FEF8F7;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .item-price { font-size: 13px; color: var(--accent); font-weight: 700; }
  .item-note { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .qty-control { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: var(--text2);
    transition: all 0.15s;
    font-family: inherit;
  }
  .qty-btn.plus { border-color: var(--primary); color: var(--primary); background: #FEF0EE; }
  .qty-btn.plus:active { background: var(--primary); color: white; }
  .qty-btn.minus:active { background: #eee; }
  .qty-num { font-size: 16px; font-weight: 900; min-width: 24px; text-align: center; }

  /* Size picker for drinks */
  .size-picker { display: flex; gap: 6px; margin-top: 6px; }
  .size-btn {
    flex: 1;
    padding: 4px 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    background: var(--bg);
    cursor: pointer;
    font-family: inherit;
    color: var(--text2);
    transition: all 0.15s;
    text-align: center;
  }
  .size-btn.active { border-color: var(--accent2); background: #EBF5FB; color: var(--accent2); }

  /* Remark input */
  .remark-row {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    margin: 16px 0;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .remark-row label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 8px; }
  .remark-row input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .remark-row input:focus { border-color: var(--accent2); }

  /* ── SUMMARY / ORDER VIEW ── */
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .summary-card h3 {
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px dashed var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .order-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid #F5EDE0;
    font-size: 14px;
    gap: 8px;
  }
  .order-row:last-child { border-bottom: none; }
  .order-name { flex: 1; font-weight: 500; }
  .order-person { font-size: 12px; color: var(--text3); }
  .order-price { font-weight: 700; color: var(--accent); white-space: nowrap; }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding-top: 10px;
    margin-top: 8px;
    border-top: 2px solid var(--border);
    font-weight: 900;
    font-size: 16px;
  }
  .total-amount { color: var(--primary); }

  .empty-state {
    text-align: center;
    color: var(--text3);
    padding: 40px 20px;
    font-size: 14px;
  }
  .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── BOTTOM CART BAR ── */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    z-index: 100;
  }
  .cart-bar .cart-info { font-size: 13px; opacity: 0.9; }
  .cart-bar .cart-total { font-size: 18px; font-weight: 900; }
  .cart-submit {
    background: white;
    color: var(--primary);
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .cart-submit:active { opacity: 0.8; }
  .cart-submit:disabled { opacity: 0.5; cursor: default; }

  /* ── CONFIRM MODAL ── */
  .confirm-modal { max-width: 400px; text-align: left; max-height: 80vh; overflow-y: auto; }
  .confirm-modal h2 { text-align: center; font-size: 18px; margin-bottom: 16px; }
  .confirm-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .confirm-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; padding-top: 12px; }
  .confirm-total .price { color: var(--primary); }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn-secondary { flex: 1; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }

  /* Success toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Admin toggle */
  .admin-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .admin-toggle label { font-size: 13px; font-weight: 700; flex: 1; }
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
  }
  .toggle-switch input { display: none; }
  .slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 24px;
    cursor: pointer;
    transition: 0.3s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle-switch input:checked + .slider { background: var(--primary); }
  .toggle-switch input:checked + .slider::before { transform: translateX(20px); }

  /* Person list in summary */
  .person-section { margin-bottom: 14px; }
  .person-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 6px;
  }
  .person-header .name { font-weight: 900; font-size: 14px; }
  .person-header .subtotal { font-size: 13px; color: var(--accent); font-weight: 700; }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .dot-food { background: var(--primary); }
  .dot-drink { background: var(--accent2); }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast">✅ 已送出訂單！</div>

<!-- Name Modal -->
<div class="modal-overlay show" id="nameModal">
  <div class="modal">
    <h2>👋 你好！</h2>
    <p>請輸入你的姓名，方便統計訂單</p>
    <input type="text" id="nameInput" placeholder="例：小明" maxlength="10" />
    <button class="btn-primary" onclick="setName()">開始點餐</button>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal confirm-modal">
    <h2>📋 確認訂單</h2>
    <div id="confirmContent"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeConfirm()">修改</button>
      <button class="btn-primary" onclick="submitOrder()" style="flex:2">確認送出</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>🍱 公司午餐點餐</h1>
      <div class="date" id="headerDate"></div>
    </div>
    <div class="my-name-badge" id="nameBadge" onclick="changeName()">⸻</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-food" onclick="switchTab('food')">🍜 主食</div>
  <div class="tab" id="tab-drink" onclick="switchTab('drink')">🧋 飲料</div>
  <div class="tab" id="tab-summary" onclick="switchTab('summary')">📋 統計 <span class="badge" id="orderCountBadge" style="display:none">0</span></div>
</div>

<!-- FOOD SECTION -->
<div class="section active" id="sec-food">
  <div class="store-selector">
    <h3>今日主食店家</h3>
    <div class="store-grid">
      <button class="store-btn active" onclick="selectFoodStore('小紅堂')" id="fs-小紅堂">
        <span class="emoji">🥩</span>小紅堂
      </button>
      <button class="store-btn" onclick="selectFoodStore('有餘')" id="fs-有餘">
        <span class="emoji">🐟</span>有餘
      </button>
      <button class="store-btn" onclick="selectFoodStore('鄉寓')" id="fs-鄉寓">
        <span class="emoji">🍛</span>鄉寓
      </button>
    </div>
  </div>
  <div id="foodMenu"></div>
  <div class="remark-row">
    <label>備註（加麵、少辣等）</label>
    <input type="text" id="foodRemark" placeholder="例：麵條換手工麵、不要辣" />
  </div>
</div>

<!-- DRINK SECTION -->
<div class="section" id="sec-drink">
  <div class="store-selector">
    <h3>今日飲料店家</h3>
    <div class="store-grid">
      <button class="store-btn active" onclick="selectDrinkStore('可不可')" id="ds-可不可">
        <span class="emoji">☕</span>可不可
      </button>
      <button class="store-btn" onclick="selectDrinkStore('老賴')" id="ds-老賴">
        <span class="emoji">🍹</span>老賴
      </button>
      <button class="store-btn" onclick="selectDrinkStore('得正')" id="ds-得正">
        <span class="emoji">🍵</span>得正
      </button>
    </div>
  </div>
  <div id="drinkMenu"></div>
  <div class="remark-row">
    <label>飲料備註（甜度、冰量）</label>
    <input type="text" id="drinkRemark" placeholder="例：少糖少冰、無糖去冰" />
  </div>
</div>

<!-- SUMMARY SECTION -->
<div class="section" id="sec-summary">
  <div class="admin-toggle">
    <label>👑 我是今日負責人（可查看全員訂單）</label>
    <label class="toggle-switch">
      <input type="checkbox" id="adminToggle" onchange="renderSummary()">
      <span class="slider"></span>
    </label>
  </div>
  <div id="summaryContent"></div>
</div>

<!-- Cart Bar -->
<div class="cart-bar" id="cartBar" style="display:none">
  <div>
    <div class="cart-info" id="cartInfo">已選 0 項</div>
    <div class="cart-total" id="cartTotal">$0</div>
  </div>
  <button class="cart-submit" id="cartSubmitBtn" onclick="openConfirm()">送出訂單 →</button>
</div>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let myName = localStorage.getItem('lunchName') || '';
let currentFoodStore = '小紅堂';
let currentDrinkStore = '可不可';
let myFoodOrder = {}; // key: itemName -> qty
let myDrinkOrder = {}; // key: itemName -> {qty, size}
let allOrders = JSON.parse(localStorage.getItem('lunchOrders') || '[]');
let currentTab = 'food';

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent =
    `${now.getMonth()+1}/${now.getDate()}（${days[now.getDay()]}）`;

  if (myName) {
    document.getElementById('nameModal').classList.remove('show');
    document.getElementById('nameBadge').textContent = `👤 ${myName}`;
    // Load my order if exists
    loadMyOrder();
  }
  renderFoodMenu();
  renderDrinkMenu();
  updateCartBar();
  updateSummaryBadge();
});

function setName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) { document.getElementById('nameInput').style.borderColor='red'; return; }
  myName = val;
  localStorage.setItem('lunchName', val);
  document.getElementById('nameModal').classList.remove('show');
  document.getElementById('nameBadge').textContent = `👤 ${myName}`;
  loadMyOrder();
}
function changeName() {
  document.getElementById('nameInput').value = myName;
  document.getElementById('nameModal').classList.add('show');
}

function loadMyOrder() {
  const today = new Date().toDateString();
  const me = allOrders.find(o => o.name === myName && o.date === today);
  if (me) {
    myFoodOrder = me.food || {};
    myDrinkOrder = me.drink || {};
    currentFoodStore = me.foodStore || '小紅堂';
    currentDrinkStore = me.drinkStore || '可不可';
    selectFoodStore(currentFoodStore, false);
    selectDrinkStore(currentDrinkStore, false);
    renderFoodMenu();
    renderDrinkMenu();
    updateCartBar();
  }
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  ['food','drink','summary'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`sec-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'summary') { renderSummary(); document.getElementById('cartBar').style.display = 'none'; }
  else updateCartBar();
}

// ═══════════════════════════════════════
// STORE SELECT
// ═══════════════════════════════════════
function selectFoodStore(name, rerender=true) {
  currentFoodStore = name;
  document.querySelectorAll('[id^="fs-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`fs-${name}`).classList.add('active');
  if (rerender) { myFoodOrder = {}; renderFoodMenu(); updateCartBar(); }
}
function selectDrinkStore(name, rerender=true) {
  currentDrinkStore = name;
  document.querySelectorAll('[id^="ds-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`ds-${name}`).classList.add('active');
  if (rerender) { myDrinkOrder = {}; renderDrinkMenu(); updateCartBar(); }
}

// ═══════════════════════════════════════
// RENDER FOOD MENU
// ═══════════════════════════════════════
function renderFoodMenu() {
  const container = document.getElementById('foodMenu');
  const menu = FOOD_MENUS[currentFoodStore];
  let html = '';
  menu.forEach(cat => {
    html += `<div class="category-title">🍜 ${cat.cat}</div>`;
    cat.items.forEach(item => {
      const qty = myFoodOrder[item.n] || 0;
      const selected = qty > 0;
      html += `
        <div class="menu-item ${selected ? 'selected' : ''}" id="fi-${esc(item.n)}">
          <div class="item-info">
            <div class="item-name">${item.n}</div>
            <div class="item-price">$${item.p}</div>
            ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
          <div class="qty-control">
            <button class="qty-btn minus" onclick="changeFoodQty('${esc(item.n)}', ${item.p}, -1)" ${qty===0?'style="opacity:.3"':''}>−</button>
            <div class="qty-num">${qty||''}</div>
            <button class="qty-btn plus" onclick="changeFoodQty('${esc(item.n)}', ${item.p}, 1)">+</button>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function changeFoodQty(name, price, delta) {
  const cur = myFoodOrder[name] || 0;
  const nv = Math.max(0, cur + delta);
  if (nv === 0) delete myFoodOrder[name]; else myFoodOrder[name] = nv;
  renderFoodMenu();
  updateCartBar();
}

// ═══════════════════════════════════════
// RENDER DRINK MENU
// ═══════════════════════════════════════
function renderDrinkMenu() {
  const container = document.getElementById('drinkMenu');
  const menu = DRINK_MENUS[currentDrinkStore];
  let html = '';
  menu.forEach(cat => {
    html += `<div class="category-title">🧋 ${cat.cat}</div>`;
    cat.items.forEach(item => {
      const key = item.n;
      const order = myDrinkOrder[key];
      const qty = order ? order.qty : 0;
      const sizes = item.sizes || {};
      const sizeKeys = Object.keys(sizes);
      const curSize = order ? order.size : (sizeKeys[0] || '');
      const price = item.p || (sizes[curSize] || sizes[sizeKeys[0]] || 0);
      const selected = qty > 0;
      let sizeHtml = '';
      if (sizeKeys.length > 1) {
        sizeHtml = `<div class="size-picker">` +
          sizeKeys.map(sk => `<button class="size-btn ${curSize===sk?'active':''}" onclick="setDrinkSize('${esc(key)}', '${sk}', ${sizes[sk]})">${sk} $${sizes[sk]}</button>`).join('') +
          `</div>`;
      }
      html += `
        <div class="menu-item ${selected ? 'selected' : ''}" id="di-${esc(key)}">
          <div class="item-info">
            <div class="item-name">${item.n}</div>
            <div class="item-price">$${price}</div>
            ${sizeHtml}
          </div>
          <div class="qty-control">
            <button class="qty-btn minus" onclick="changeDrinkQty('${esc(key)}', -1)" ${qty===0?'style="opacity:.3"':''}>−</button>
            <div class="qty-num">${qty||''}</div>
            <button class="qty-btn plus" onclick="changeDrinkQty('${esc(key)}', 1)">+</button>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
}

function setDrinkSize(key, size, price) {
  if (!myDrinkOrder[key]) myDrinkOrder[key] = {qty:0, size, price};
  else { myDrinkOrder[key].size = size; myDrinkOrder[key].price = price; }
  renderDrinkMenu();
  updateCartBar();
}

function changeDrinkQty(key, delta) {
  const menu = DRINK_MENUS[currentDrinkStore];
  let item;
  menu.forEach(c => c.items.forEach(i => { if(i.n===key) item=i; }));
  if (!item) return;
  const cur = myDrinkOrder[key] || {qty:0, size:'', price:0};
  const nv = Math.max(0, (cur.qty||0) + delta);
  if (nv === 0) { delete myDrinkOrder[key]; }
  else {
    if (!myDrinkOrder[key]) {
      const sizes = item.sizes || {};
      const sk = Object.keys(sizes)[0];
      myDrinkOrder[key] = {qty: nv, size: sk||'', price: item.p || sizes[sk] || 0};
    } else {
      myDrinkOrder[key].qty = nv;
    }
  }
  renderDrinkMenu();
  updateCartBar();
}

// ═══════════════════════════════════════
// CART
// ═══════════════════════════════════════
function calcTotal() {
  let total = 0;
  const menu = FOOD_MENUS[currentFoodStore];
  menu.forEach(cat => cat.items.forEach(item => {
    if (myFoodOrder[item.n]) total += item.p * myFoodOrder[item.n];
  }));
  Object.values(myDrinkOrder).forEach(o => total += (o.price||0) * o.qty);
  return total;
}

function countItems() {
  const f = Object.values(myFoodOrder).reduce((a,b)=>a+b,0);
  const d = Object.values(myDrinkOrder).reduce((a,b)=>a+b.qty,0);
  return f + d;
}

function updateCartBar() {
  if (currentTab === 'summary') return;
  const total = calcTotal();
  const count = countItems();
  const bar = document.getElementById('cartBar');
  if (count > 0) {
    bar.style.display = 'flex';
    document.getElementById('cartInfo').textContent = `已選 ${count} 項`;
    document.getElementById('cartTotal').textContent = `$${total}`;
  } else {
    bar.style.display = 'none';
  }
}

// ═══════════════════════════════════════
// CONFIRM & SUBMIT
// ═══════════════════════════════════════
function openConfirm() {
  const total = calcTotal();
  let html = '';
  const menu = FOOD_MENUS[currentFoodStore];
  menu.forEach(cat => cat.items.forEach(item => {
    if (myFoodOrder[item.n]) {
      html += `<div class="confirm-item"><span>🍜 ${item.n} ×${myFoodOrder[item.n]}</span><span>$${item.p * myFoodOrder[item.n]}</span></div>`;
    }
  }));
  Object.entries(myDrinkOrder).forEach(([k,o]) => {
    html += `<div class="confirm-item"><span>🧋 ${k}${o.size?' ('+o.size+')':''} ×${o.qty}</span><span>$${o.price*o.qty}</span></div>`;
  });
  const fRemark = document.getElementById('foodRemark').value;
  const dRemark = document.getElementById('drinkRemark').value;
  if (fRemark) html += `<div class="confirm-item" style="color:#888"><span>主食備註</span><span>${fRemark}</span></div>`;
  if (dRemark) html += `<div class="confirm-item" style="color:#888"><span>飲料備註</span><span>${dRemark}</span></div>`;
  html += `<div class="confirm-total"><span>合計</span><span class="price">$${total}</span></div>`;
  document.getElementById('confirmContent').innerHTML = html;
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('show'); }

function submitOrder() {
  const today = new Date().toDateString();
  const order = {
    name: myName,
    date: today,
    foodStore: currentFoodStore,
    drinkStore: currentDrinkStore,
    food: {...myFoodOrder},
    drink: JSON.parse(JSON.stringify(myDrinkOrder)),
    foodRemark: document.getElementById('foodRemark').value,
    drinkRemark: document.getElementById('drinkRemark').value,
    time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
  };
  // Remove existing order by same person today
  allOrders = allOrders.filter(o => !(o.name === myName && o.date === today));
  allOrders.push(order);
  localStorage.setItem('lunchOrders', JSON.stringify(allOrders));
  closeConfirm();
  updateSummaryBadge();
  showToast('✅ 訂單送出！');
  updateCartBar();
}

function updateSummaryBadge() {
  const today = new Date().toDateString();
  const count = allOrders.filter(o => o.date === today).length;
  const badge = document.getElementById('orderCountBadge');
  if (count > 0) { badge.style.display='inline'; badge.textContent=count; }
  else badge.style.display='none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════
function renderSummary() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => o.date === today);
  const isAdmin = document.getElementById('adminToggle').checked;
  const container = document.getElementById('summaryContent');

  if (todayOrders.length === 0) {
    container.innerHTML = `<div class="empty-state"><span class="emoji">🍽️</span>今天還沒有人點餐</div>`;
    return;
  }

  // My order summary
  const myOrder = todayOrders.find(o => o.name === myName);
  let html = '';

  if (myOrder) {
    html += `<div class="summary-card">
      <h3><span class="status-dot dot-food"></span>我的訂單（${myOrder.name}）<span style="font-size:12px;color:var(--text3);margin-left:auto">${myOrder.time}</span></h3>`;
    let sub = 0;
    const fMenu = FOOD_MENUS[myOrder.foodStore];
    let hasFoodItems = false;
    fMenu.forEach(cat => cat.items.forEach(item => {
      if (myOrder.food[item.n]) {
        const amt = item.p * myOrder.food[item.n];
        sub += amt;
        hasFoodItems = true;
        html += `<div class="order-row"><span class="order-name">🍜 ${item.n} ×${myOrder.food[item.n]}</span><span class="order-price">$${amt}</span></div>`;
      }
    }));
    if (myOrder.foodRemark) html += `<div class="order-row"><span class="order-name" style="color:var(--text3)">備註：${myOrder.foodRemark}</span></div>`;
    Object.entries(myOrder.drink||{}).forEach(([k,o]) => {
      const amt = o.price * o.qty;
      sub += amt;
      html += `<div class="order-row"><span class="order-name">🧋 ${k}${o.size?' ('+o.size+')':''} ×${o.qty}</span><span class="order-price">$${amt}</span></div>`;
    });
    if (myOrder.drinkRemark) html += `<div class="order-row"><span class="order-name" style="color:var(--text3)">備註：${myOrder.drinkRemark}</span></div>`;
    html += `<div class="total-row"><span>個人小計</span><span class="total-amount">$${sub}</span></div>`;
    html += `</div>`;
  }

  if (isAdmin) {
    // Group by food store
    const foodStores = [...new Set(todayOrders.map(o=>o.foodStore))];
    foodStores.forEach(store => {
      const storeOrders = todayOrders.filter(o=>o.foodStore===store);
      // Aggregate food items
      const agg = {};
      storeOrders.forEach(o => {
        Object.entries(o.food||{}).forEach(([k,q]) => { agg[k]=(agg[k]||0)+q; });
      });
      if (Object.keys(agg).length === 0) return;
      html += `<div class="summary-card">
        <h3>🍜 ${store} 彙整（${storeOrders.length}人）</h3>`;
      const fMenu = FOOD_MENUS[store];
      let storeTotal = 0;
      fMenu.forEach(cat => cat.items.forEach(item => {
        if (agg[item.n]) {
          const amt = item.p * agg[item.n];
          storeTotal += amt;
          const persons = storeOrders.filter(o=>o.food[item.n]).map(o=>o.name).join('、');
          html += `<div class="order-row">
            <div><span class="order-name">${item.n} ×${agg[item.n]}</span><br><span class="order-person">→ ${persons}</span></div>
            <span class="order-price">$${amt}</span>
          </div>`;
        }
      }));
      const remarks = storeOrders.filter(o=>o.foodRemark).map(o=>`${o.name}：${o.foodRemark}`).join('；');
      if (remarks) html += `<div class="order-row"><span style="font-size:12px;color:var(--text3)">備註 ${remarks}</span></div>`;
      html += `<div class="total-row"><span>主食小計</span><span class="total-amount">$${storeTotal}</span></div></div>`;
    });

    // Drink aggregation
    const drinkStores = [...new Set(todayOrders.map(o=>o.drinkStore))];
    drinkStores.forEach(store => {
      const storeOrders = todayOrders.filter(o=>o.drinkStore===store);
      const agg = {};
      storeOrders.forEach(o => {
        Object.entries(o.drink||{}).forEach(([k,v]) => {
          const key = `${k}${v.size?' ('+v.size+')':''}`;
          if (!agg[key]) agg[key] = {qty:0, price:v.price};
          agg[key].qty += v.qty;
        });
      });
      if (Object.keys(agg).length === 0) return;
      html += `<div class="summary-card"><h3>🧋 ${store} 彙整</h3>`;
      let drinkTotal = 0;
      Object.entries(agg).forEach(([k,v]) => {
        const amt = v.price * v.qty;
        drinkTotal += amt;
        html += `<div class="order-row"><span class="order-name">${k} ×${v.qty}</span><span class="order-price">$${amt}</span></div>`;
      });
      const remarks = storeOrders.filter(o=>o.drinkRemark).map(o=>`${o.name}：${o.drinkRemark}`).join('；');
      if (remarks) html += `<div class="order-row"><span style="font-size:12px;color:var(--text3)">備註 ${remarks}</span></div>`;
      html += `<div class="total-row"><span>飲料小計</span><span class="total-amount">$${drinkTotal}</span></div></div>`;
    });

    // Per person totals
    html += `<div class="summary-card"><h3>💰 個人金額統計</h3>`;
    let grandTotal = 0;
    todayOrders.forEach(o => {
      let pt = 0;
      const fMenu = FOOD_MENUS[o.foodStore];
      fMenu.forEach(cat => cat.items.forEach(item => { if(o.food[item.n]) pt += item.p * o.food[item.n]; }));
      Object.values(o.drink||{}).forEach(d => pt += d.price * d.qty);
      grandTotal += pt;
      html += `<div class="order-row"><span class="order-name">${o.name}</span><span class="order-price">$${pt}</span></div>`;
    });
    html += `<div class="total-row"><span>總計</span><span class="total-amount">$${grandTotal}</span></div></div>`;

    // Export text button
    html += `<button class="btn-primary" onclick="exportText()" style="margin-bottom:16px">📋 複製Line訂單文字</button>`;
  } else if (!myOrder) {
    html += `<div class="empty-state"><span class="emoji">📝</span>你今天還沒點餐！</div>`;
  }

  container.innerHTML = html;
}

function exportText() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => o.date === today);
  const foodStores = [...new Set(todayOrders.map(o=>o.foodStore))];
  const drinkStores = [...new Set(todayOrders.map(o=>o.drinkStore))];
  let text = `📋 今日午餐訂單\n${'─'.repeat(20)}\n`;

  foodStores.forEach(store => {
    text += `\n🍜 ${store}\n`;
    const agg = {};
    todayOrders.filter(o=>o.foodStore===store).forEach(o => {
      Object.entries(o.food||{}).forEach(([k,q]) => { agg[k]=(agg[k]||0)+q; });
    });
    const fMenu = FOOD_MENUS[store];
    fMenu.forEach(cat => cat.items.forEach(item => {
      if (agg[item.n]) text += `  ${item.n} ×${agg[item.n]}\n`;
    }));
    const remarks = todayOrders.filter(o=>o.foodStore===store&&o.foodRemark).map(o=>`${o.name}：${o.foodRemark}`);
    if (remarks.length) text += `  備註：${remarks.join('；')}\n`;
  });

  drinkStores.forEach(store => {
    text += `\n🧋 ${store}\n`;
    const agg = {};
    todayOrders.filter(o=>o.drinkStore===store).forEach(o => {
      Object.entries(o.drink||{}).forEach(([k,v]) => {
        const key = `${k}${v.size?' ('+v.size+')':''}`;
        agg[key] = (agg[key]||0) + v.qty;
      });
    });
    Object.entries(agg).forEach(([k,q]) => { text += `  ${k} ×${q}\n`; });
    const remarks = todayOrders.filter(o=>o.drinkStore===store&&o.drinkRemark).map(o=>`${o.name}：${o.drinkRemark}`);
    if (remarks.length) text += `  備註：${remarks.join('；')}\n`;
  });

  text += `\n${'─'.repeat(20)}\n`;
  todayOrders.forEach(o => {
    let pt = 0;
    const fMenu = FOOD_MENUS[o.foodStore];
    fMenu.forEach(cat => cat.items.forEach(item => { if(o.food[item.n]) pt += item.p * o.food[item.n]; }));
    Object.values(o.drink||{}).forEach(d => pt += d.price * d.qty);
    text += `${o.name}：$${pt}\n`;
  });

  navigator.clipboard.writeText(text).then(() => showToast('✅ 已複製！可貼到 Line'));
}
</script>
</body>
</html>
