<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍱 公司午餐點餐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root {
    --bg:#FDF6ED;--card:#FFFFFF;--primary:#C0392B;--primary-light:#E74C3C;
    --accent:#E8A838;--accent2:#2980B9;--text:#1A1A1A;--text2:#555;--text3:#888;
    --border:#E8D5B7;--green:#27AE60;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px;
    --admin:#7D3C98;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}

  /* ── HEADER ── */
  .header{background:var(--primary);color:white;padding:16px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(192,57,43,0.3);}
  .header.admin-mode{background:var(--admin);}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
  .header h1{font-size:20px;font-weight:900;letter-spacing:1px;}
  .header .date{font-size:12px;opacity:0.8;}
  .name-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;white-space:nowrap;}

  /* ── SYNC BAR ── */
  .sync-bar{font-size:11px;text-align:right;padding:2px 16px;height:17px;}
  .sync-bar.ok{color:var(--green);} .sync-bar.syncing{color:var(--accent);} .sync-bar.err{color:var(--primary);}

  /* ── TABS ── */
  .tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:62px;z-index:99;}
  .tab{flex:1;text-align:center;padding:11px 6px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;position:relative;}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .tab.admin-tab.active{color:var(--admin);border-bottom-color:var(--admin);}
  .tab .badge{position:absolute;top:5px;right:6px;background:var(--primary);color:white;border-radius:10px;padding:1px 5px;font-size:10px;min-width:16px;}

  /* ── MODALS ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:white;border-radius:var(--radius);padding:28px 24px;width:88%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.25);}
  .modal h2{font-size:18px;margin-bottom:8px;}
  .modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .modal input{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;}
  .modal input:focus{border-color:var(--primary);}
  .btn-primary{background:var(--primary);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;}
  .btn-primary:disabled{opacity:0.5;cursor:default;}
  .btn-admin{background:var(--admin);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;margin-top:10px;}
  .btn-secondary{background:var(--bg);color:var(--text);border:2px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}

  /* ── SECTIONS ── */
  .section{display:none;padding:16px;}
  .section.active{display:block;}

  /* ── WAITING SCREEN ── */
  .waiting-screen{text-align:center;padding:50px 24px;}
  .waiting-screen .big-emoji{font-size:60px;display:block;margin-bottom:16px;}
  .waiting-screen h2{font-size:20px;font-weight:900;margin-bottom:10px;}
  .waiting-screen p{font-size:14px;color:var(--text2);line-height:1.7;}
  .today-stores{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
  .store-badge{background:white;border:2px solid var(--border);border-radius:12px;padding:10px 18px;font-size:14px;font-weight:700;box-shadow:var(--shadow);}
  .store-badge.food{border-color:var(--primary);color:var(--primary);}
  .store-badge.drink{border-color:var(--accent2);color:var(--accent2);}

  /* ── STORE SELECTOR (ordering) ── */
  .store-info-bar{background:white;border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .store-info-bar .label{font-size:12px;color:var(--text3);font-weight:500;}
  .store-info-bar .name{font-size:15px;font-weight:900;color:var(--primary);}

  /* ── MENU ── */
  .category-title{font-size:16px;font-weight:900;color:var(--primary);padding:14px 0 8px;border-bottom:2px solid var(--primary);margin-bottom:10px;}
  .menu-item{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .menu-item.selected{border-color:var(--primary);background:#FEF8F7;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:15px;font-weight:700;margin-bottom:2px;}
  .item-price{font-size:13px;color:var(--accent);font-weight:700;}
  .qty-control{display:flex;align-items:center;gap:6px;}
  .qty-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text2);font-family:inherit;}
  .qty-btn.plus{border-color:var(--primary);color:var(--primary);background:#FEF0EE;}
  .qty-num{font-size:16px;font-weight:900;min-width:24px;text-align:center;}
  .size-picker{display:flex;gap:6px;margin-top:6px;}
  .size-btn{flex:1;padding:4px 0;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;background:var(--bg);cursor:pointer;font-family:inherit;color:var(--text2);text-align:center;}
  .size-btn.active{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  .remark-row{background:var(--card);border-radius:var(--radius);padding:14px;margin:16px 0;box-shadow:var(--shadow);border:1px solid var(--border);}
  .remark-row label{font-size:13px;font-weight:700;display:block;margin-bottom:8px;}
  .remark-row input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;}

  /* ── ADMIN PANEL ── */
  .admin-section{padding:16px;}
  .admin-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:2px solid #E8DAEF;}
  .admin-card h3{font-size:15px;font-weight:900;color:var(--admin);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .store-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .store-btn{border:2px solid var(--border);background:var(--bg);border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:all 0.2s;color:var(--text2);}
  .store-btn.active-food{border-color:var(--primary);background:#FEF0EE;color:var(--primary);}
  .store-btn.active-drink{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  .store-btn .emoji{font-size:22px;display:block;margin-bottom:3px;}

  /* Status toggle */
  .status-control{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:12px;}
  .status-label{flex:1;}
  .status-label .title{font-size:14px;font-weight:700;}
  .status-label .desc{font-size:12px;color:var(--text3);margin-top:2px;}
  .big-toggle{position:relative;width:60px;height:32px;flex-shrink:0;}
  .big-toggle input{display:none;}
  .big-slider{position:absolute;inset:0;background:#ccc;border-radius:32px;cursor:pointer;transition:0.3s;}
  .big-slider::before{content:'';position:absolute;width:26px;height:26px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
  .big-toggle input:checked+.big-slider{background:var(--green);}
  .big-toggle input:checked+.big-slider::before{transform:translateX(28px);}

  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px;}
  .status-badge.open{background:#EAFAF1;color:var(--green);border:1.5px solid var(--green);}
  .status-badge.closed{background:#FDEDEC;color:var(--primary);border:1.5px solid var(--primary);}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dot.green{background:var(--green);animation:pulse 1.5s infinite;}
  .dot.red{background:var(--primary);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  .admin-save-btn{background:var(--admin);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;width:100%;margin-top:4px;letter-spacing:0.5px;}
  .admin-save-btn:disabled{opacity:0.5;}

  .admin-logout{background:none;border:1.5px solid rgba(255,255,255,0.4);color:white;border-radius:20px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer;}

  /* ── SUMMARY ── */
  .summary-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .summary-card h3{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed var(--border);display:flex;align-items:center;gap:6px;}
  .order-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #F5EDE0;font-size:14px;gap:8px;}
  .order-row:last-child{border-bottom:none;}
  .order-name{flex:1;font-weight:500;}
  .order-person{font-size:11px;color:var(--text3);}
  .order-price{font-weight:700;color:var(--accent);white-space:nowrap;}
  .total-row{display:flex;justify-content:space-between;padding-top:10px;margin-top:8px;border-top:2px solid var(--border);font-weight:900;font-size:16px;}
  .total-amount{color:var(--primary);}
  .empty-state{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px;}
  .empty-state .emoji{font-size:44px;display:block;margin-bottom:12px;}

  /* ── CART ── */
  .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:100;}
  .cart-info{font-size:13px;opacity:0.9;}
  .cart-total{font-size:18px;font-weight:900;}
  .cart-submit{background:white;color:var(--primary);border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;}
  .cart-submit:disabled{opacity:0.5;}

  /* ── CONFIRM ── */
  .confirm-modal{max-width:400px;text-align:left;max-height:80vh;overflow-y:auto;}
  .confirm-modal h2{text-align:center;font-size:18px;margin-bottom:16px;}
  .confirm-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .confirm-total{display:flex;justify-content:space-between;font-size:16px;font-weight:900;padding-top:12px;}
  .confirm-total .price{color:var(--primary);}
  .btn-row{display:flex;gap:10px;margin-top:20px;}

  /* ── TOAST ── */
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#2C3E50;color:white;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:300;transition:transform 0.3s;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* ── MISC ── */
  .loading{text-align:center;padding:30px;color:var(--text3);}
  .spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .divider{border:none;border-top:1px dashed var(--border);margin:16px 0;}
  .export-btn{background:var(--primary);color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;width:100%;margin-bottom:14px;}

  /* ── SWEET / ICE PICKER ── */
  .drink-options{margin-top:7px;display:flex;flex-direction:column;gap:5px;}
  .option-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .option-label{font-size:11px;color:var(--text3);font-weight:700;width:32px;flex-shrink:0;}
  .opt-btn{padding:3px 9px;border:1.5px solid var(--border);border-radius:16px;font-size:12px;font-weight:700;background:var(--bg);cursor:pointer;font-family:inherit;color:var(--text2);white-space:nowrap;transition:all 0.15s;}
  .opt-btn.sweet-active{border-color:#E67E22;background:#FEF5EC;color:#E67E22;}
  .opt-btn.ice-active{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  /* optional store toggle in admin */
  .optional-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .optional-row label{font-size:13px;color:var(--text2);}
  .small-toggle{position:relative;width:38px;height:22px;}
  .small-toggle input{display:none;}
  .small-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:0.3s;}
  .small-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s;}
  .small-toggle input:checked+.small-slider{background:var(--green);}
  .small-toggle input:checked+.small-slider::before{transform:translateX(16px);}
  /* aggregated order table */
  .agg-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
  .agg-table th{background:var(--bg);padding:6px 8px;text-align:left;font-weight:700;font-size:12px;color:var(--text3);}
  .agg-table td{padding:7px 8px;border-bottom:1px solid #F5EDE0;vertical-align:top;}
  .agg-table tr:last-child td{border-bottom:none;}
  .agg-count{font-weight:900;color:var(--primary);text-align:center;}
  .agg-detail{font-size:11px;color:var(--text3);margin-top:2px;}

  /* ── MENU MANAGER ── */
  .menu-mgr-tab-row{display:flex;gap:8px;margin-bottom:16px;}
  .menu-mgr-tab{flex:1;padding:9px;border:2px solid var(--border);border-radius:10px;background:var(--bg);font-family:inherit;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;}
  .menu-mgr-tab.active{border-color:var(--admin);background:#F5EEF8;color:var(--admin);}
  .upload-zone{border:2.5px dashed var(--border);border-radius:14px;padding:30px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--admin);background:#F5EEF8;}
  .upload-zone .uz-icon{font-size:40px;margin-bottom:10px;}
  .upload-zone p{font-size:14px;color:var(--text2);margin:0;}
  .upload-zone small{font-size:12px;color:var(--text3);}
  .preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin:10px 0;border:1px solid var(--border);}
  .ai-result-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F5EDE0;}
  .ai-result-item:last-child{border-bottom:none;}
  .ai-item-name{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;outline:none;}
  .ai-item-price{width:70px;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;outline:none;text-align:right;}
  .ai-item-name:focus,.ai-item-price:focus{border-color:var(--admin);}
  .ai-del-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:2px 6px;}
  .ai-add-row{display:flex;gap:8px;margin-top:8px;}
  .ai-add-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;}
  .ai-add-row input:focus{border-color:var(--admin);}
  .ai-add-btn{background:var(--admin);color:white;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .saved-store-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .saved-store-card .sc-name{flex:1;font-weight:700;font-size:15px;}
  .saved-store-card .sc-type{font-size:12px;color:var(--text3);margin-top:2px;}
  .saved-store-card .sc-count{font-size:12px;color:var(--text3);}
  .sc-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--text2);}
  .sc-btn.del{border-color:#FADBD8;color:var(--primary);}
  .type-tabs{display:flex;gap:6px;margin-bottom:14px;}
  .type-tab{flex:1;padding:8px;border:2px solid var(--border);border-radius:10px;background:var(--bg);font-family:inherit;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;}
  .type-tab.active-food{border-color:var(--primary);background:#FEF0EE;color:var(--primary);}
  .type-tab.active-drink{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  .ai-status{background:#F5EEF8;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--admin);margin:10px 0;display:flex;align-items:center;gap:8px;}

  /* ── EDIT / DELETE ── */
  .order-actions{display:flex;gap:6px;margin-top:10px;}
  .btn-edit{flex:1;background:#EBF5FB;color:var(--accent2);border:1.5px solid var(--accent2);border-radius:8px;padding:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .btn-delete{flex:1;background:#FDEDEC;color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;padding:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .btn-edit:active{background:var(--accent2);color:white;}
  .btn-delete:active{background:var(--primary);color:white;}
  /* Edit modal — full screen on mobile */
  .edit-modal{max-width:480px;text-align:left;max-height:88vh;overflow-y:auto;padding:20px 18px;width:94%;}
  .edit-modal h2{text-align:center;font-size:17px;margin-bottom:14px;}
  .edit-section-title{font-size:14px;font-weight:900;color:var(--primary);padding:10px 0 6px;border-bottom:2px solid var(--primary);margin-bottom:8px;}
  .edit-item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F5EDE0;}
  .edit-item-row:last-child{border-bottom:none;}
  .edit-item-name{flex:1;font-size:14px;font-weight:500;}
  .edit-item-price{font-size:12px;color:var(--accent);font-weight:700;margin-right:4px;}
  .edit-size-picker{display:flex;gap:4px;margin-top:4px;}
  .edit-size-btn{padding:3px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;background:var(--bg);cursor:pointer;font-family:inherit;color:var(--text2);}
  .edit-size-btn.active{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  .edit-remark{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;margin-top:4px;}
  .edit-remark:focus{border-color:var(--accent2);}
  /* Delete confirm modal */
  .delete-modal{max-width:320px;}
  .delete-modal h2{color:var(--primary);}
  .delete-modal p{margin-bottom:0;}
  .person-order-block{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:10px;border:1px solid var(--border);}
  .person-order-block .person-name{font-weight:900;font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .person-action-btns{display:flex;gap:5px;}
  .icon-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 5px;border-radius:6px;}
  .icon-btn:hover{background:#eee;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── NAME MODAL ── -->
<div class="modal-overlay show" id="nameModal">
  <div class="modal">
    <h2>👋 你好！</h2>
    <p>請輸入你的姓名，方便統計訂單</p>

async function fbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error('fbGet fail');
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error('fbSet fail');
  return r.json();
}
async function fbPatch(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error('fbPatch fail');
  return r.json();
}
let _esOrders = null, _esConfig = null;
function fbListenOrders(cb) {
  if (_esOrders) _esOrders.close();
  _esOrders = new EventSource(`${DB}/orders/${TODAY}.json`);
  _esOrders.addEventListener('put', e => { try { allOrders = JSON.parse(e.data).data || {}; cb(allOrders); } catch(_){} });
  _esOrders.addEventListener('patch', e => { try { const p=JSON.parse(e.data).data; Object.assign(allOrders,p); cb(allOrders); } catch(_){} });
  _esOrders.onerror = () => setSyncBar('err','⚠️ 連線中斷，請重新整理');
}
function fbListenConfig(cb) {
  if (_esConfig) _esConfig.close();
  _esConfig = new EventSource(`${DB}/config/${TODAY}.json`);
  _esConfig.addEventListener('put', e => { try { const d=JSON.parse(e.data).data; if(d) { todayConfig=d; cb(d); } } catch(_){} });

document.addEventListener('DOMContentLoaded', () => {
  const now = new Date(); const days=['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent = `${now.getMonth()+1}/${now.getDate()}（${days[now.getDay()]}）`;
  if (myName) {
    document.getElementById('nameModal').classList.remove('show');
    renderHeaderRight();
    startListening();
  }
});

function startListening() {
  setSyncBar('syncing','⟳ 連線中...');
  fbListenConfig(cfg => {
    todayConfig = cfg || { foodStore: null, drinkStore: null, isOpen: false };
    setSyncBar('ok','✓ 即時同步中');
    renderFoodSection();
    renderDrinkSection();
    if (isAdmin) syncAdminUI();
  });
  fbListenOrders(orders => {
    allOrders = orders || {};
    updateBadge();
    if (curTab === 'summary') renderSummary();
    if (isAdmin) renderAdminSummary();
    // restore my order
    const key = nameKey(myName);
    const me = allOrders[key];
    if (me && me.foodStore === todayConfig.foodStore) {
      myFood = me.food || {};
      myDrink = me.drink || {};
      document.getElementById('foodRemark') && (document.getElementById('foodRemark').value = me.foodRemark || '');
      document.getElementById('drinkRemark') && (document.getElementById('drinkRemark').value = me.drinkRemark || '');
    }
    updateCart();
  });
}

function switchTab(t) {
  curTab = t;
  const allTabs = ['food','drink','summary','admin','menus'];
  allTabs.forEach(x => {
    const tb = document.getElementById(`tab-${x}`); if (!tb) return;
    tb.classList.toggle('active', x===t);
    const sec = document.getElementById(`sec-${x}`); if (!sec) return;
    sec.classList.toggle('active', x===t);
  });
  document.getElementById('cartBar').style.display = 'none';
  if (t==='food' || t==='drink') updateCart();
  if (t==='summary') renderSummary();
  if (t==='admin') { syncAdminUI(); renderAdminSummary(); }
  if (t==='menus') renderSavedStores();
}

function renderFoodSection() {
  const container = document.getElementById('foodContent');
  const store = todayConfig.foodStore;
  const isOpen = todayConfig.isOpen;
  if (!store || !isOpen) {
    container.innerHTML = waitingHTML('food', store);
    return;
  }
  const menuData = FM[store] || getMenuData('food', store);
  if (!menuData) {
    container.innerHTML = waitingHTML('food', store);
    return;
  }
  let h = `<div class="store-info-bar"><div><div class="label">今日主食</div><div class="name">🥩 ${store}</div></div></div>`;
  menuData.forEach(cat => {
    h += `<div class="category-title">🍜 ${cat.cat}</div>`;
    cat.items.forEach(i => {
      const q = myFood[i.n]||0;
      h += `<div class="menu-item ${q>0?'selected':''}">
        <div class="item-info"><div class="item-name">${i.n}</div><div class="item-price">$${i.p}</div></div>
        <div class="qty-control">
          <button class="qty-btn" onclick="chgF('${esc(i.n)}',${i.p},-1)" ${q===0?'style="opacity:.3"':''}>−</button>
          <div class="qty-num">${q||''}</div>
          <button class="qty-btn plus" onclick="chgF('${esc(i.n)}',${i.p},1)">+</button>
        </div></div>`;
    });
  });
  h += `<div class="remark-row"><label>📝 備註（加麵、少辣等）</label><input type="text" id="foodRemark" placeholder="例：麵條換手工麵、不要辣"/></div>`;
  container.innerHTML = h;
}

// ══════════════════════════════════════════
// SWEET / ICE OPTIONS
// ══════════════════════════════════════════
const SWEET_OPTS = ['無糖','1分糖','微糖','半糖','全糖'];
const ICE_OPTS   = ['去冰','少冰','微冰','正常冰'];
const DEFAULT_SWEET = '半糖';
const DEFAULT_ICE   = '正常冰';

function drinkKey(name, size) { return size ? `${name}__${size}` : name; }
function drinkDisplay(name, size) { return size ? `${name}（${size}）` : name; }

function renderDrinkSection() {
  const container = document.getElementById('drinkContent');
  const store = todayConfig.drinkStore;
  const isOpen = todayConfig.isOpen;
  if (!store || !isOpen) {
    container.innerHTML = waitingHTML('drink', store);
    return;
  }
  let h = `<div class="store-info-bar"><div><div class="label">今日飲料</div><div class="name">🧋 ${store}</div></div></div>`;
  DM[store].forEach(cat => {
    h += `<div class="category-title">🧋 ${cat.cat}</div>`;
    cat.items.forEach(i => {
      const sk = Object.keys(i.s || {});
      // For each size (or single item), render a row
      const sizeList = sk.length > 1 ? sk : [sk[0] || ''];
      sizeList.forEach(sz => {
        const key = drinkKey(i.n, sk.length > 1 ? sz : '');
        const ord = myDrink[key];
        const q = ord ? ord.qty : 0;
        const pr = i.p || i.s?.[sz] || 0;
        const sweet = ord?.sweet || DEFAULT_SWEET;
        const ice   = ord?.ice   || DEFAULT_ICE;
        const label = sk.length > 1 ? `${i.n}（${sz}） $${pr}` : `${i.n}`;
        h += `<div class="menu-item ${q > 0 ? 'selected' : ''}">
          <div class="item-info">
            <div class="item-name">${label}</div>
            <div class="item-price">$${pr}</div>
            ${q > 0 ? `<div class="drink-options">
              <div class="option-row">
                <span class="option-label">甜度</span>
                ${SWEET_OPTS.map(s=>`<button class="opt-btn ${sweet===s?'sweet-active':''}" onclick="setDrinkOpt('${esc(key)}','sweet','${s}')">${s}</button>`).join('')}
              </div>
              <div class="option-row">
                <span class="option-label">冰量</span>
                ${ICE_OPTS.map(ic=>`<button class="opt-btn ${ice===ic?'ice-active':''}" onclick="setDrinkOpt('${esc(key)}','ice','${ic}')">${ic}</button>`).join('')}
              </div>
            </div>` : ''}
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="chgD2('${esc(key)}','${esc(i.n)}','${sz}',${pr},-1)" ${q===0?'style="opacity:.3"':''}>−</button>
            <div class="qty-num">${q||''}</div>
            <button class="qty-btn plus" onclick="chgD2('${esc(key)}','${esc(i.n)}','${sz}',${pr},1)">+</button>
          </div>
        </div>`;
      });
    });
  });
  h += `<div class="remark-row"><label>📝 其他飲料備註</label><input type="text" id="drinkRemark" placeholder="其他特殊需求"/></div>`;
  container.innerHTML = h;
}

function waitingHTML(type, store) {
  if (!todayConfig.foodStore && !todayConfig.drinkStore) {
    return `<div class="waiting-screen">
      <span class="big-emoji">⏳</span>
      <h2>等待負責人設定</h2>
      <p>負責人尚未設定今日店家<br>請稍候，設定後頁面會自動更新</p>
    </div>`;
  }
  if (store && !todayConfig.isOpen) {
    return `<div class="waiting-screen">
      <span class="big-emoji">🔒</span>
      <h2>點餐尚未開放</h2>
      <p>負責人已選好今日店家<br>等待開放點餐後即可點選</p>
      <div class="today-stores">
        ${todayConfig.foodStore?`<div class="store-badge food">🥩 ${todayConfig.foodStore}</div>`:''}
        ${todayConfig.drinkStore?`<div class="store-badge drink">🧋 ${todayConfig.drinkStore}</div>`:''}
      </div>
    </div>`;
  }
  if (!store) {
    return `<div class="waiting-screen">
      <span class="big-emoji">⏳</span>
      <h2>等待負責人設定</h2>
      <p>請稍候，設定後頁面會自動更新</p>
    </div>`;
  }
  return '';
}

// ══════════════════════════════════════════
// MENU INTERACTIONS
// ══════════════════════════════════════════
const esc = s => s.replace(/'/g,"\\'");
function chgF(n,p,d){ const q=Math.max(0,(myFood[n]||0)+d); if(q===0) delete myFood[n]; else myFood[n]=q; renderFoodSection(); updateCart(); }

// New drink functions using composite key (name__size)
function chgD2(key, name, sz, pr, d) {
  const cur = myDrink[key] || {qty:0};
  const q = Math.max(0, cur.qty + d);
  if (q === 0) { delete myDrink[key]; }
  else if (!myDrink[key]) {
    myDrink[key] = {qty:q, name, size:sz, price:pr, sweet:DEFAULT_SWEET, ice:DEFAULT_ICE};
  } else { myDrink[key].qty = q; }
  renderDrinkSection(); updateCart();
}
function setDrinkOpt(key, opt, val) {
  if (!myDrink[key]) return;
  myDrink[key][opt] = val;
  renderDrinkSection(); updateCart();
}
// Keep old chgD for backward compat in edit modal (will be updated separately)
function chgD(n,d){
  let item; DM[todayConfig.drinkStore]?.forEach(c=>c.items.forEach(i=>{if(i.n===n)item=i;})); if(!item) return;
  const key=n; const cur=myDrink[key]||{qty:0}; const q=Math.max(0,cur.qty+d);
  if(q===0){ delete myDrink[key]; }
  else if(!myDrink[key]){ const sk=Object.keys(item.s||{})[0]||''; myDrink[key]={qty:q,name:n,size:sk,price:item.p||item.s?.[sk]||0,sweet:DEFAULT_SWEET,ice:DEFAULT_ICE}; }
  else myDrink[key].qty=q;
  renderDrinkSection(); updateCart();
}

// ══════════════════════════════════════════
// CART
// ══════════════════════════════════════════
function calcTotal(){
  let t=0;
  FM[todayConfig.foodStore]?.forEach(c=>c.items.forEach(i=>{if(myFood[i.n])t+=i.p*myFood[i.n];}));
  Object.values(myDrink).forEach(o=>t+=(o.price||0)*o.qty);
  return t;
}
function countItems(){ return Object.values(myFood).reduce((a,b)=>a+b,0)+Object.values(myDrink).reduce((a,b)=>a+b.qty,0); }
function updateCart(){
  if(curTab==='summary'||curTab==='admin') return;
  const c=countItems(),t=calcTotal(),bar=document.getElementById('cartBar');
  if(c>0&&todayConfig.isOpen){ bar.style.display='flex'; document.getElementById('cartInfo').textContent=`已選 ${c} 項`; document.getElementById('cartTotal').textContent=`$${t}`; }
  else bar.style.display='none';
}

// ══════════════════════════════════════════
function openConfirm(){
  let h='';
  FM[todayConfig.foodStore]?.forEach(c=>c.items.forEach(i=>{if(myFood[i.n]) h+=`<div class="confirm-item"><span>🍜 ${i.n} ×${myFood[i.n]}</span><span>$${i.p*myFood[i.n]}</span></div>`;}));
  Object.entries(myDrink).forEach(([k,o])=>{
    const label=`🧋 ${o.name||k}${o.size?'（'+o.size+'）':''} ×${o.qty}`;
    const opts=`${o.sweet||''}${o.ice?' '+o.ice:''}`;
    h+=`<div class="confirm-item"><span>${label}<br><span style="font-size:11px;color:#888">${opts}</span></span><span>$${o.price*o.qty}</span></div>`;
  });
  const fr=document.getElementById('foodRemark')?.value||'';
  const dr=document.getElementById('drinkRemark')?.value||'';
  if(fr) h+=`<div class="confirm-item" style="color:#888"><span>主食備註</span><span>${fr}</span></div>`;
  if(dr) h+=`<div class="confirm-item" style="color:#888"><span>飲料備註</span><span>${dr}</span></div>`;
  h+=`<div class="confirm-total"><span>合計</span><span class="price">$${calcTotal()}</span></div>`;
  document.getElementById('confirmContent').innerHTML=h;
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirmModal').classList.remove('show'); }

async function submitOrder(){
  const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='送出中...';
  setSyncBar('syncing','⟳ 儲存中...');
  try{
    const order={
      name:myName, foodStore:todayConfig.foodStore, drinkStore:todayConfig.drinkStore,
      food:{...myFood}, drink:JSON.parse(JSON.stringify(myDrink)),
      foodRemark:document.getElementById('foodRemark')?.value||'',
      drinkRemark:document.getElementById('drinkRemark')?.value||'',
      time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}), ts:Date.now()
    };
    await fbSet(`orders/${TODAY}/${nameKey(myName)}`, order);
    closeConfirm(); setSyncBar('ok','✓ 已送出'); showToast('✅ 訂單送出成功！'); updateBadge();
  }catch(e){ setSyncBar('err','⚠️ 送出失敗'); showToast('❌ 網路錯誤，請再試一次'); }
  btn.disabled=false; btn.textContent='確認送出';
}

  if(n>0){b.style.display='inline';b.textContent=n;}else b.style.display='none';
}

function toggleDrinkEnabled(){
  const on=document.getElementById('drinkEnabled').checked;

async function saveAdminSettings(){
  const foodOn = document.getElementById('foodEnabled').checked;
  const drinkOn = document.getElementById('drinkEnabled').checked;
  if(!foodOn && !drinkOn){ showToast('⚠️ 請至少選擇主食或飲料其中一項'); return; }
  const foodStore = foodOn ? (adminDraftFood || todayConfig.foodStore) : null;
  const drinkStore = drinkOn ? (adminDraftDrink || todayConfig.drinkStore) : null;
  if(foodOn && !foodStore){ showToast('⚠️ 請選擇今日主食店家'); return; }
  if(drinkOn && !drinkStore){ showToast('⚠️ 請選擇今日飲料店家'); return; }
  const isOpen = document.getElementById('orderStatusToggle').checked;
  const btn=document.getElementById('adminSaveBtn'); btn.disabled=true; btn.textContent='儲存中...';
  try{
    await fbSet(`config/${TODAY}`,{foodStore:foodStore||null, drinkStore:drinkStore||null, isOpen, updatedAt:Date.now()});
    showToast(isOpen ? '✅ 設定已儲存，點餐已開放！' : '✅ 設定已儲存');
  }catch(e){ showToast('❌ 儲存失敗，請重試'); }
  btn.disabled=false; btn.textContent='💾 儲存設定並通知同仁';
}

function personTotal(o){
  let t=0;
  FM[o.foodStore]?.forEach(c=>c.items.forEach(i=>{if(o.food?.[i.n])t+=i.p*o.food[i.n];}));
  Object.values(o.drink||{}).forEach(d=>t+=d.price*d.qty);
  return t;
}

function renderSummary(){
  const orders=Object.values(allOrders||{});
  const container=document.getElementById('summaryContent');
  if(orders.length===0){ container.innerHTML=`<div class="empty-state"><span class="emoji">🍽️</span>今天還沒有人點餐</div>`; return; }
  const myOrd=allOrders[nameKey(myName)];
  let h='';
  if(myOrd){
    h+=`<div class="summary-card"><h3>✅ 我的訂單 <span style="font-size:11px;color:var(--text3);margin-left:auto">${myOrd.time}</span></h3>`;
    FM[myOrd.foodStore]?.forEach(c=>c.items.forEach(i=>{ if(myOrd.food?.[i.n]){ const a=i.p*myOrd.food[i.n]; h+=`<div class="order-row"><span class="order-name">🍜 ${i.n} ×${myOrd.food[i.n]}</span><span class="order-price">$${a}</span></div>`; }}));
    if(myOrd.foodRemark) h+=`<div class="order-row"><span style="color:var(--text3);font-size:12px">備註：${myOrd.foodRemark}</span></div>`;
    Object.entries(myOrd.drink||{}).forEach(([k,o])=>{
      const a=o.price*o.qty;
      const label=`🧋 ${o.name||k}${o.size?'（'+o.size+'）':''} ×${o.qty}`;
      h+=`<div class="order-row"><div><span class="order-name">${label}</span><div class="agg-detail">${o.sweet||''}${o.ice?' · '+o.ice:''}</div></div><span class="order-price">$${a}</span></div>`;
    });
    if(myOrd.drinkRemark) h+=`<div class="order-row"><span style="color:var(--text3);font-size:12px">備註：${myOrd.drinkRemark}</span></div>`;
    h+=`<div class="total-row"><span>個人小計</span><span class="total-amount">$${personTotal(myOrd)}</span></div>`;
    h+=`<div class="order-actions">
      <button class="btn-edit" data-key="${nameKey(myName)}" onclick="openEdit(this.dataset.key)">✏️ 修改訂單</button>
      <button class="btn-delete" data-key="${nameKey(myName)}" data-name="${myName.replace(/"/g,'&quot;')}" onclick="openDelete(this.dataset.key, this.dataset.name)">🗑️ 刪除訂單</button>
    </div></div>`;
  } else {
    h+=`<div class="empty-state"><span class="emoji">📝</span>你今天還沒點餐！</div>`;
  }
  // Aggregated table
  h += buildAggCard(orders);
  h+=`<div class="summary-card"><h3>👥 今日已點餐（${orders.length}人）</h3>`;
  orders.forEach(o=>{ h+=`<div class="order-row"><span class="order-name">${o.name}</span><span style="font-size:12px;color:var(--text3)">${o.time}</span><span class="order-price">$${personTotal(o)}</span></div>`; });
  h+=`</div>`;
  container.innerHTML=h;
}

function buildAggCard(orders) {
  // Food agg
  let foodRows='', drinkRows='';
  const foodStores=[...new Set(orders.map(o=>o.foodStore).filter(Boolean))];
  foodStores.forEach(store=>{
    const agg={};
    orders.filter(o=>o.foodStore===store).forEach(o=>Object.entries(o.food||{}).forEach(([k,q])=>{agg[k]=(agg[k]||0)+q;}));
    FM[store]?.forEach(c=>c.items.forEach(i=>{ if(agg[i.n]) foodRows+=`<tr><td>🍜 ${i.n}</td><td class="agg-count">×${agg[i.n]}</td></tr>`; }));
  });
  // Drink agg — group by name+size+sweet+ice
  const drinkStores=[...new Set(orders.map(o=>o.drinkStore).filter(Boolean))];
  drinkStores.forEach(()=>{
    const agg={};
    orders.forEach(o=>Object.entries(o.drink||{}).forEach(([,v])=>{
      const label=`${v.name||''}${v.size?'（'+v.size+'）':''}`;
      const opts=`${v.sweet||DEFAULT_SWEET} ${v.ice||DEFAULT_ICE}`;
      const key=`${label}|||${opts}`;
      if(!agg[key]) agg[key]={label,opts,qty:0,price:v.price};
      agg[key].qty+=v.qty;
    }));
    Object.values(agg).forEach(v=>{ drinkRows+=`<tr><td>🧋 ${v.label}<div class="agg-detail">${v.opts}</div></td><td class="agg-count">×${v.qty}</td></tr>`; });
  });
  if(!foodRows && !drinkRows) return '';
  return `<div class="summary-card"><h3>📊 今日訂單彙整</h3>
    <table class="agg-table">
      <thead><tr><th>品項</th><th style="text-align:center">數量</th></tr></thead>
      <tbody>${foodRows}${drinkRows}</tbody>
    </table></div>`;
}

    Object.entries(agg).forEach(([k,v])=>{ const a=v.price*v.qty; t+=a; h+=`<div class="order-row"><span class="order-name">${k} ×${v.qty}</span><span class="order-price">$${a}</span></div>`; });

function exportText(){
  const orders=Object.values(allOrders||{});
  let txt=`📋 今日午餐訂單\n${'─'.repeat(20)}\n`;
  // Food
  [...new Set(orders.map(o=>o.foodStore).filter(Boolean))].forEach(store=>{
    txt+=`\n🍜 ${store}\n`; const agg={};
    orders.filter(o=>o.foodStore===store).forEach(o=>Object.entries(o.food||{}).forEach(([k,q])=>{agg[k]=(agg[k]||0)+q;}));
    FM[store]?.forEach(c=>c.items.forEach(i=>{if(agg[i.n]) txt+=`  ${i.n} ×${agg[i.n]}\n`;}));
    const r=orders.filter(o=>o.foodStore===store&&o.foodRemark).map(o=>`${o.name}：${o.foodRemark}`);
    if(r.length) txt+=`  備註：${r.join('；')}\n`;
  });
  // Drink — group by name+size+sweet+ice
  [...new Set(orders.map(o=>o.drinkStore).filter(Boolean))].forEach(store=>{
    txt+=`\n🧋 ${store}\n`;
    const agg={};
    orders.filter(o=>o.drinkStore===store).forEach(o=>Object.entries(o.drink||{}).forEach(([,v])=>{
      const label=`${v.name||''}${v.size?'（'+v.size+'）':''}`;
      const opts=`${v.sweet||DEFAULT_SWEET} ${v.ice||DEFAULT_ICE}`;
      const key=`${label}|||${opts}`;
      if(!agg[key]) agg[key]={label,opts,qty:0};
      agg[key].qty+=v.qty;
    }));
    Object.values(agg).forEach(v=>{ txt+=`  ${v.label} ×${v.qty}（${v.opts}）\n`; });
    const r=orders.filter(o=>o.drinkStore===store&&o.drinkRemark).map(o=>`${o.name}：${o.drinkRemark}`);
    if(r.length) txt+=`  備註：${r.join('；')}\n`;
  });
  txt+=`\n${'─'.repeat(20)}\n`;
  orders.forEach(o=>{ txt+=`${o.name}：$${personTotal(o)}\n`; });
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ 已複製！貼到 Line 傳給店家'));
}

let editTargetKey = null;
let editFood = {}, editDrink = {};

function openEdit(key) {
  const ord = allOrders[key];
  if (!ord) return;
  editTargetKey = key;
  editFood = JSON.parse(JSON.stringify(ord.food || {}));
  editDrink = JSON.parse(JSON.stringify(ord.drink || {}));
  document.getElementById('editModalTitle').textContent = `✏️ 修改 ${ord.name} 的訂單`;
  renderEditModal(ord);
  document.getElementById('editModal').classList.add('show');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('show');
  editTargetKey = null; editFood = {}; editDrink = {};
}

function renderEditModal(ord) {
  const fStore = ord.foodStore || todayConfig.foodStore;
  const dStore = ord.drinkStore || todayConfig.drinkStore;
  let h = '';

  // Food items
  h += `<div class="edit-section-title">🍜 ${fStore}</div>`;
  FM[fStore]?.forEach(cat => {
    cat.items.forEach(i => {
      const q = editFood[i.n] || 0;
      h += `<div class="edit-item-row">
        <div style="flex:1"><div class="edit-item-name">${i.n}</div><div class="edit-item-price">$${i.p}</div></div>
        <div class="qty-control">
          <button class="qty-btn" onclick="editChgF('${esc(i.n)}',${i.p},-1)" ${q===0?'style="opacity:.3"':''}>−</button>
          <div class="qty-num" id="efq-${esc(i.n)}">${q||''}</div>
          <button class="qty-btn plus" onclick="editChgF('${esc(i.n)}',${i.p},1)">+</button>
        </div></div>`;
    });
  });

  // Drink items
  h += `<div class="edit-section-title" style="margin-top:12px">🧋 ${dStore}</div>`;
  DM[dStore]?.forEach(cat => {
    cat.items.forEach(i => {
      const ord2 = editDrink[i.n]; const q = ord2 ? ord2.qty : 0;
      const sk = Object.keys(i.s || {}); const cs = ord2 ? ord2.size : (sk[0] || '');
      const pr = i.p || (i.s?.[cs] || i.s?.[sk[0]] || 0);
      let sp = '';
      if (sk.length > 1) sp = `<div class="edit-size-picker">` + sk.map(k => `<button class="edit-size-btn ${cs===k?'active':''}" onclick="editSetDS('${esc(i.n)}','${k}',${i.s[k]})">${k} $${i.s[k]}</button>`).join('') + `</div>`;
      h += `<div class="edit-item-row">
        <div style="flex:1"><div class="edit-item-name">${i.n}</div><div class="edit-item-price">$${pr}</div>${sp}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="editChgD('${esc(i.n)}','${esc(dStore)}',-1)" ${q===0?'style="opacity:.3"':''}>−</button>
          <div class="qty-num" id="edq-${esc(i.n)}">${q||''}</div>
          <button class="qty-btn plus" onclick="editChgD('${esc(i.n)}','${esc(dStore)}',1)">+</button>
        </div></div>`;
    });
  });

  // Remarks
  h += `<div style="margin-top:12px"><label style="font-size:13px;font-weight:700;display:block;margin-bottom:6px">📝 主食備註</label>
    <input class="edit-remark" id="editFoodRemark" value="${(ord.foodRemark||'').replace(/"/g,'&quot;')}" placeholder="加麵、少辣等"/></div>`;
  h += `<div style="margin-top:10px"><label style="font-size:13px;font-weight:700;display:block;margin-bottom:6px">📝 飲料備註</label>
    <input class="edit-remark" id="editDrinkRemark" value="${(ord.drinkRemark||'').replace(/"/g,'&quot;')}" placeholder="少糖少冰等"/></div>`;

  document.getElementById('editModalContent').innerHTML = h;
}

function editChgF(n, p, d) {
  const q = Math.max(0, (editFood[n] || 0) + d);
  if (q === 0) delete editFood[n]; else editFood[n] = q;
  const el = document.getElementById(`efq-${n}`); if (el) el.textContent = q || '';
  // update minus opacity
  const row = el?.closest('.edit-item-row');
  if (row) { const minus = row.querySelectorAll('.qty-btn')[0]; if (minus) minus.style.opacity = q === 0 ? '.3' : '1'; }
}
function editSetDS(n, sk, pr) {
  if (!editDrink[n]) editDrink[n] = {qty:0, size:sk, price:pr};
  else { editDrink[n].size = sk; editDrink[n].price = pr; }
  // re-render just the size buttons for this item
  document.querySelectorAll('.edit-size-btn').forEach(b => {
    if (b.onclick?.toString().includes(`'${n}'`)) b.classList.toggle('active', b.textContent.startsWith(sk));
  });
}
function editChgD(n, store, d) {
  let item; DM[store]?.forEach(c => c.items.forEach(i => { if (i.n === n) item = i; })); if (!item) return;
  const cur = editDrink[n] || {qty:0}; const q = Math.max(0, cur.qty + d);
  if (q === 0) { delete editDrink[n]; }
  else if (!editDrink[n]) { const sk = Object.keys(item.s || {})[0] || ''; editDrink[n] = {qty:q, size:sk, price:item.p||item.s?.[sk]||0}; }
  else editDrink[n].qty = q;
  const el = document.getElementById(`edq-${n}`); if (el) el.textContent = q || '';
  const row = el?.closest('.edit-item-row');
  if (row) { const minus = row.querySelectorAll('.qty-btn')[0]; if (minus) minus.style.opacity = q === 0 ? '.3' : '1'; }
}

async function saveEdit() {
  if (!editTargetKey) return;
  const btn = document.getElementById('editSaveBtn'); btn.disabled = true; btn.textContent = '儲存中...';
  try {
    const orig = allOrders[editTargetKey];
    const updated = {
      ...orig,
      food: {...editFood},
      drink: JSON.parse(JSON.stringify(editDrink)),
      foodRemark: document.getElementById('editFoodRemark')?.value || '',
      drinkRemark: document.getElementById('editDrinkRemark')?.value || '',
      editedAt: new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})
    };
    await fbSet(`orders/${TODAY}/${editTargetKey}`, updated);
    closeEdit();
    showToast('✅ 訂單已修改！');
  } catch(e) { showToast('❌ 修改失敗，請重試'); }
  btn.disabled = false; btn.textContent = '✅ 儲存修改';
}

function handleImgSelect(e) {

  loadImgFile(file);
}
function handleImgDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const file = e.dataTransfer.files[0]; if (!file) return;
  loadImgFile(file);
}
function loadImgFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    menuImgBase64 = ev.target.result.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = ev.target.result; img.style.display = '';
    document.getElementById('aiScanBtn').style.display = '';
    document.getElementById('aiStatus').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function runAIScan() {
  if (!menuImgBase64) return;
  const btn = document.getElementById('aiScanBtn');
  btn.disabled = true; btn.textContent = '🤖 AI 辨識中...';
  const statusEl = document.getElementById('aiStatus');
  statusEl.style.display = '';
  statusEl.innerHTML = `<div class="ai-status"><span class="spinner"></span>AI 正在辨識菜單圖片，請稍候...</div>`;

  // 自動偵測圖片格式
  const imgEl = document.getElementById('previewImg');
  let mediaType = 'image/jpeg';
  if (imgEl.src.startsWith('data:image/png')) mediaType = 'image/png';
  else if (imgEl.src.startsWith('data:image/webp')) mediaType = 'image/webp';
  else if (imgEl.src.startsWith('data:image/gif')) mediaType = 'image/gif';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: menuImgBase64 }
            },
            {
              type: 'text',
              text: `請辨識這張菜單圖片中所有的品項名稱和價格。只回傳純 JSON，不要 markdown 或說明文字，格式：{"items":[{"name":"品項名稱","price":價格數字},...]}`
            }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errBody}`);
    }

    const data = await resp.json();

    // 檢查 API 層級錯誤
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const text = data.content?.map(c => c.text||'').join('') || '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    newStoreItems = (parsed.items || []).map(i => ({
      name: String(i.name || '').trim(),
      price: Number(i.price) || 0
    })).filter(i => i.name);

    if (!newStoreItems.length) throw new Error('未辨識到任何品項，請確認圖片清晰度或改用手動輸入');

    statusEl.innerHTML = `<div class="ai-status">✅ 辨識完成！共找到 ${newStoreItems.length} 個品項，可在下方修改後儲存</div>`;
    renderItemsList();
  } catch(e) {
    console.error('AI scan error:', e);
    statusEl.innerHTML = `<div class="ai-status" style="background:#FDEDEC;color:var(--primary)">
      ❌ 辨識失敗：${e.message}<br>
      <span style="font-size:12px">可改用下方手動輸入品項</span>
    </div>`;
  }
  btn.disabled = false; btn.textContent = '🤖 重新辨識';
}

// ── Items list render ──
function renderItemsList() {
  const el = document.getElementById('itemsList');
  document.getElementById('itemCountBadge').textContent = `共 ${newStoreItems.length} 項`;
  if (!newStoreItems.length) { el.innerHTML = `<div style="text-align:center;color:var(--text3);padding:14px;font-size:13px">尚未新增品項</div>`; return; }
  el.innerHTML = newStoreItems.map((item, i) => `
    <div class="ai-result-item">
      <input class="ai-item-name" value="${item.name.replace(/"/g,'&quot;')}" oninput="newStoreItems[${i}].name=this.value" placeholder="品項名稱"/>
      <span style="font-size:13px;color:var(--text3)">$</span>
      <input class="ai-item-price" value="${item.price}" oninput="newStoreItems[${i}].price=Number(this.value)||0" placeholder="0" type="number"/>
      <button class="ai-del-btn" onclick="newStoreItems.splice(${i},1);renderItemsList()">🗑️</button>
    </div>`).join('');
}

function addItemManually() {
  const n = document.getElementById('addItemName').value.trim();
  const p = Number(document.getElementById('addItemPrice').value) || 0;
  if (!n) { document.getElementById('addItemName').style.borderColor='red'; return; }
  document.getElementById('addItemName').style.borderColor='';
  newStoreItems.push({ name: n, price: p });
  document.getElementById('addItemName').value = '';
  document.getElementById('addItemPrice').value = '';
  renderItemsList();
}

// ── Save new store to Firebase ──
async function saveNewStore() {
  const name = document.getElementById('newStoreName').value.trim();
  if (!name) { document.getElementById('newStoreName').style.borderColor='red'; showToast('⚠️ 請輸入店家名稱'); return; }
  if (!newStoreItems.length) { showToast('⚠️ 請至少新增一個品項'); return; }

  // Build menu structure: single category "菜單"
  const storeData = {
    name,
    type: newStoreType,
    categories: [{ cat: '菜單', items: newStoreItems.map(i => ({ n: i.name, p: i.price })) }],
    createdAt: Date.now()
  };

  // Use name as key (sanitized)
  const key = name.replace(/[.#$\/\[\]\s]/g, '_');
  try {
    await fbSet(`menus/${key}`, storeData);
    savedMenus[key] = storeData;
    showToast(`✅ 「${name}」已儲存！`);
    // Reset form
    document.getElementById('newStoreName').value = '';
    newStoreItems = [];
    menuImgBase64 = null;
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('aiScanBtn').style.display = 'none';
    document.getElementById('aiStatus').style.display = 'none';
    document.getElementById('menuImgInput').value = '';
    renderItemsList();
    updateAdminStoreGrids();
    updateSavedCount();
    switchMMTab('saved');
  } catch(e) { showToast('❌ 儲存失敗，請重試'); }
}

// ── Load saved menus from Firebase ──
async function loadSavedMenus() {
  try {
    const data = await fbGet('menus');
    savedMenus = data || {};
    updateAdminStoreGrids();
    updateSavedCount();
  } catch(e) {}
}

function updateSavedCount() {
  document.getElementById('savedCount').textContent = Object.keys(savedMenus).length;
}

// ── Render saved stores list ──
function renderSavedStores() {
  const el = document.getElementById('savedStoresList');
  const entries = Object.entries(savedMenus);
  if (!entries.length) {
    el.innerHTML = `<div class="empty-state"><span class="emoji">📂</span>尚無自訂菜單<br><small>點「新增菜單」來新增</small></div>`;
    return;
  }
  el.innerHTML = entries.map(([key, store]) => {
    const itemCount = store.categories?.reduce((a,c)=>a+(c.items?.length||0),0) || 0;
    const typeLabel = store.type === 'drink' ? '🧋 飲料' : '🍜 主食';
    return `<div class="saved-store-card">
      <div style="flex:1">
        <div class="sc-name">${store.name}</div>
        <div class="sc-type">${typeLabel} · ${itemCount} 個品項</div>
      </div>
      <button class="sc-btn del" data-key="${key}" data-name="${store.name.replace(/"/g,'&quot;')}" onclick="deleteStore(this.dataset.key, this.dataset.name)">刪除</button>
    </div>`;
  }).join('');
}

// ── Delete saved store ──
async function deleteStore(key, name) {
  if (!confirm(`確定要刪除「${name}」的菜單？`)) return;
  try {
    await fetch(`${DB}/menus/${key}.json`, { method: 'DELETE' });
    delete savedMenus[key];
    updateAdminStoreGrids();
    updateSavedCount();
    renderSavedStores();
    showToast(`🗑️「${name}」已刪除`);
  } catch(e) { showToast('❌ 刪除失敗'); }
}

// ── Inject custom stores into admin store grids ──
function updateAdminStoreGrids() {
  const foodGrid = document.getElementById('foodStoreGrid');
  const drinkGrid = document.getElementById('drinkStoreGrid');

  // Remove previously injected custom buttons
  foodGrid.querySelectorAll('.custom-store-btn').forEach(b => b.remove());
  drinkGrid.querySelectorAll('.custom-store-btn').forEach(b => b.remove());

  Object.entries(savedMenus).forEach(([key, store]) => {
    const btn = document.createElement('button');
    btn.className = 'store-btn custom-store-btn';
    btn.id = `afs-${store.name}`;
    btn.innerHTML = `<span class="emoji">🏪</span>${store.name}`;
    if (store.type === 'food') {
      btn.onclick = () => adminSelectFood(store.name);
      btn.id = `afs-${store.name}`;
      foodGrid.querySelector('.store-grid').appendChild(btn);
    } else {
      btn.onclick = () => adminSelectDrink(store.name);
      btn.id = `ads-${store.name}`;
      drinkGrid.querySelector('.store-grid').appendChild(btn);
    }
  });
}

// ── Get menu data (built-in or custom) ──
function getMenuData(type, storeName) {
  if (type === 'food') {
    if (FM[storeName]) return FM[storeName];
    const key = storeName.replace(/[.#$\/\[\]\s]/g, '_');
    return savedMenus[key]?.categories || savedMenus[storeName]?.categories || null;
  } else {
    if (DM[storeName]) return DM[storeName];
    const key = storeName.replace(/[.#$\/\[\]\s]/g, '_');
    return savedMenus[key]?.categories || savedMenus[storeName]?.categories || null;
  }
}
