<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍱 公司午餐點餐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root {
    --bg:#FDF6ED;--card:#FFFFFF;--primary:#C0392B;--primary-light:#E74C3C;
    --accent:#E8A838;--accent2:#2980B9;--text:#1A1A1A;--text2:#555;--text3:#888;
    --border:#E8D5B7;--green:#27AE60;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}
  .header{background:var(--primary);color:white;padding:16px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(192,57,43,0.3);}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .header h1{font-size:20px;font-weight:900;letter-spacing:1px;}
  .header .date{font-size:12px;opacity:0.8;}
  .my-name-badge{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;white-space:nowrap;}
  .tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:64px;z-index:99;}
  .tab{flex:1;text-align:center;padding:12px 8px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;position:relative;}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .tab .badge{position:absolute;top:6px;right:8px;background:var(--primary);color:white;border-radius:10px;padding:1px 6px;font-size:10px;min-width:18px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:white;border-radius:var(--radius);padding:28px 24px;width:88%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
  .modal h2{font-size:18px;margin-bottom:8px;}
  .modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .modal input{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;}
  .modal input:focus{border-color:var(--primary);}
  .btn-primary{background:var(--primary);color:white;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;transition:background 0.2s;}
  .btn-primary:disabled{opacity:0.5;cursor:default;}
  .section{display:none;padding:16px;}
  .section.active{display:block;}
  .store-selector{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .store-selector h3{font-size:14px;color:var(--text3);margin-bottom:12px;font-weight:500;}
  .store-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .store-btn{border:2px solid var(--border);background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:all 0.2s;color:var(--text2);}
  .store-btn.active{border-color:var(--primary);background:#FEF0EE;color:var(--primary);}
  .store-btn .emoji{font-size:20px;display:block;margin-bottom:2px;}
  .category-title{font-size:16px;font-weight:900;color:var(--primary);padding:14px 0 8px;border-bottom:2px solid var(--primary);margin-bottom:10px;}
  .menu-item{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .menu-item.selected{border-color:var(--primary);background:#FEF8F7;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:15px;font-weight:700;margin-bottom:2px;}
  .item-price{font-size:13px;color:var(--accent);font-weight:700;}
  .qty-control{display:flex;align-items:center;gap:6px;}
  .qty-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text2);font-family:inherit;}
  .qty-btn.plus{border-color:var(--primary);color:var(--primary);background:#FEF0EE;}
  .qty-num{font-size:16px;font-weight:900;min-width:24px;text-align:center;}
  .size-picker{display:flex;gap:6px;margin-top:6px;}
  .size-btn{flex:1;padding:4px 0;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;background:var(--bg);cursor:pointer;font-family:inherit;color:var(--text2);text-align:center;}
  .size-btn.active{border-color:var(--accent2);background:#EBF5FB;color:var(--accent2);}
  .remark-row{background:var(--card);border-radius:var(--radius);padding:14px;margin:16px 0;box-shadow:var(--shadow);border:1px solid var(--border);}
  .remark-row label{font-size:13px;font-weight:700;display:block;margin-bottom:8px;}
  .remark-row input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;}
  .summary-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .summary-card h3{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed var(--border);display:flex;align-items:center;gap:8px;}
  .order-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #F5EDE0;font-size:14px;gap:8px;}
  .order-row:last-child{border-bottom:none;}
  .order-name{flex:1;font-weight:500;}
  .order-person{font-size:12px;color:var(--text3);}
  .order-price{font-weight:700;color:var(--accent);white-space:nowrap;}
  .total-row{display:flex;justify-content:space-between;padding-top:10px;margin-top:8px;border-top:2px solid var(--border);font-weight:900;font-size:16px;}
  .total-amount{color:var(--primary);}
  .empty-state{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px;}
  .empty-state .emoji{font-size:40px;display:block;margin-bottom:10px;}
  .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:100;}
  .cart-info{font-size:13px;opacity:0.9;}
  .cart-total{font-size:18px;font-weight:900;}
  .cart-submit{background:white;color:var(--primary);border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;}
  .confirm-modal{max-width:400px;text-align:left;max-height:80vh;overflow-y:auto;}
  .confirm-modal h2{text-align:center;font-size:18px;margin-bottom:16px;}
  .confirm-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .confirm-total{display:flex;justify-content:space-between;font-size:16px;font-weight:900;padding-top:12px;}
  .confirm-total .price{color:var(--primary);}
  .btn-row{display:flex;gap:10px;margin-top:20px;}
  .btn-secondary{flex:1;background:var(--bg);color:var(--text);border:2px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:white;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:300;transition:transform 0.3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .admin-toggle{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .admin-toggle label{font-size:13px;font-weight:700;flex:1;}
  .toggle-switch{position:relative;width:44px;height:24px;}
  .toggle-switch input{display:none;}
  .slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:0.3s;}
  .slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s;}
  .toggle-switch input:checked+.slider{background:var(--primary);}
  .toggle-switch input:checked+.slider::before{transform:translateX(20px);}
  .sync-bar{font-size:11px;text-align:right;padding:3px 16px 0;height:18px;}
  .sync-bar.ok{color:var(--green);}
  .sync-bar.syncing{color:var(--accent);}
  .sync-bar.err{color:var(--primary);}
  .loading{text-align:center;padding:30px;color:var(--text3);}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="sync-bar" id="syncBar"></div>

<!-- Tabs -->

<!-- FOOD -->

      <button class="store-btn" onclick="selectFoodStore('鄉寓')" id="fs-鄉寓"><span class="emoji">🍛</span>鄉寓</button>
    </div>
  </div>
  <div id="foodMenu"></div>
  <div class="remark-row">
    <label>📝 備註（加麵、少辣等）</label>
    <input type="text" id="foodRemark" placeholder="例：麵條換手工麵、不要辣" />
  </div>
</div>

<!-- DRINK -->
<div class="section" id="sec-drink">
  <div class="store-selector">
    <h3>今日飲料店家</h3>
    <div class="store-grid">
      <button class="store-btn active" onclick="selectDrinkStore('可不可')" id="ds-可不可"><span class="emoji">☕</span>可不可</button>
      <button class="store-btn" onclick="selectDrinkStore('老賴')" id="ds-老賴"><span class="emoji">🍹</span>老賴</button>
      <button class="store-btn" onclick="selectDrinkStore('得正')" id="ds-得正"><span class="emoji">🍵</span>得正</button>
    </div>
  </div>
  <div id="drinkMenu"></div>
  <div class="remark-row">
    <label>📝 飲料備註（甜度、冰量）</label>
    <input type="text" id="drinkRemark" placeholder="例：少糖少冰、無糖去冰" />
  </div>
</div>

<!-- SUMMARY -->
<div class="section" id="sec-summary">
  <div class="admin-toggle">
    <label>👑 我是今日負責人（查看全員訂單）</label>
    <label class="toggle-switch">
      <input type="checkbox" id="adminToggle" onchange="renderSummary()">
      <span class="slider"></span>
    </label>
  </div>
  <div id="summaryContent"><div class="loading"><span class="spinner"></span>載入中...</div></div>
</div>

<!-- Cart Bar -->
<div class="cart-bar" id="cartBar" style="display:none">
  <div>
    <div class="cart-info" id="cartInfo"></div>
    <div class="cart-total" id="cartTotal"></div>
  </div>
  <button class="cart-submit" onclick="openConfirm()">送出訂單 →</button>
</div>

async function fbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error('fbGet fail');
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error('fbSet fail');
  return r.json();
}
let _es = null;
function fbListen(path, cb) {
  if (_es) _es.close();
  _es = new EventSource(`${DB}/${path}.json`);
  _es.addEventListener('put', e => { try { cb(JSON.parse(e.data).data); } catch(_){} });
  _es.addEventListener('patch', e => {
    try { const p=JSON.parse(e.data).data; Object.assign(allOrders,p); cb(allOrders); } catch(_){}
  });
  _es.onerror = () => setSyncBar('err','⚠️ 連線中斷，請重新整理頁面');

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let myName = localStorage.getItem('lunchName')||'';
let curFS = '小紅堂', curDS = '可不可';
let myFood = {}, myDrink = {};
let allOrders = {};
let curTab = 'food';

function setSyncBar(type,msg){const e=document.getElementById('syncBar');e.className='sync-bar '+type;e.textContent=msg;}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date(); const days=['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent=`${now.getMonth()+1}/${now.getDate()}（${days[now.getDay()]}）`;
  if(myName){
    document.getElementById('nameModal').classList.remove('show');
    document.getElementById('nameBadge').textContent=`👤 ${myName}`;
    startListen();
  }
  renderFM(); renderDM();
});

function startListen(){
  setSyncBar('syncing','⟳ 連線中...');
  fbListen(`orders/${TODAY}`, data=>{
    allOrders = data||{};
    setSyncBar('ok','✓ 即時同步中');
    updateBadge();
    const key=myName.replace(/[.#$\/\[\]]/g,'_');
    const me=allOrders[key];
    if(me){
      myFood=me.food||{}; myDrink=me.drink||{};
      curFS=me.foodStore||'小紅堂'; curDS=me.drinkStore||'可不可';
      document.getElementById('foodRemark').value=me.foodRemark||'';
      document.getElementById('drinkRemark').value=me.drinkRemark||'';
      syncStoreUI();
      renderFM(); renderDM(); updateCart();
    }
    if(curTab==='summary') renderSummary();
  });
}

function syncStoreUI(){
  document.querySelectorAll('[id^="fs-"]').forEach(b=>b.classList.remove('active'));
  const fb=document.getElementById(`fs-${curFS}`); if(fb) fb.classList.add('active');
  document.querySelectorAll('[id^="ds-"]').forEach(b=>b.classList.remove('active'));
  const db=document.getElementById(`ds-${curDS}`); if(db) db.classList.add('active');
}

function setName(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v){document.getElementById('nameInput').style.borderColor='red';return;}
  myName=v; localStorage.setItem('lunchName',v);
  document.getElementById('nameModal').classList.remove('show');
  document.getElementById('nameBadge').textContent=`👤 ${myName}`;
  startListen();
}
function changeName(){ document.getElementById('nameInput').value=myName; document.getElementById('nameModal').classList.add('show'); }

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(t){
  curTab=t;
  ['food','drink','summary'].forEach(x=>{
    document.getElementById(`tab-${x}`).classList.toggle('active',x===t);
    document.getElementById(`sec-${x}`).classList.toggle('active',x===t);
  });
  if(t==='summary'){renderSummary();document.getElementById('cartBar').style.display='none';}
  else updateCart();
}

// ══════════════════════════════════════════
// STORE
// ══════════════════════════════════════════
function selectFoodStore(n,re=true){
  curFS=n; document.querySelectorAll('[id^="fs-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById(`fs-${n}`).classList.add('active');
  if(re){myFood={};renderFM();updateCart();}
}
function selectDrinkStore(n,re=true){
  curDS=n; document.querySelectorAll('[id^="ds-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById(`ds-${n}`).classList.add('active');
  if(re){myDrink={};renderDM();updateCart();}
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
const esc=s=>s.replace(/'/g,"\\'");
function renderFM(){
  let h='';
  FM[curFS].forEach(cat=>{
    h+=`<div class="category-title">🍜 ${cat.cat}</div>`;
    cat.items.forEach(i=>{
      const q=myFood[i.n]||0;
      h+=`<div class="menu-item ${q>0?'selected':''}">
        <div class="item-info"><div class="item-name">${i.n}</div><div class="item-price">$${i.p}</div></div>
        <div class="qty-control">
          <button class="qty-btn" onclick="chgF('${esc(i.n)}',${i.p},-1)" ${q===0?'style="opacity:.3"':''}>−</button>
          <div class="qty-num">${q||''}</div>
          <button class="qty-btn plus" onclick="chgF('${esc(i.n)}',${i.p},1)">+</button>
        </div></div>`;
    });
  });
  document.getElementById('foodMenu').innerHTML=h;
}
function renderDM(){
  let h='';
  DM[curDS].forEach(cat=>{
    h+=`<div class="category-title">🧋 ${cat.cat}</div>`;
    cat.items.forEach(i=>{
      const ord=myDrink[i.n]; const q=ord?ord.qty:0;
      const sk=Object.keys(i.s||{}); const cs=ord?ord.size:(sk[0]||'');
      const pr=i.p||(i.s?.[cs]||i.s?.[sk[0]]||0);
      let sp='';
      if(sk.length>1) sp=`<div class="size-picker">`+sk.map(k=>`<button class="size-btn ${cs===k?'active':''}" onclick="setDS('${esc(i.n)}','${k}',${i.s[k]})">${k} $${i.s[k]}</button>`).join('')+`</div>`;
      h+=`<div class="menu-item ${q>0?'selected':''}">
        <div class="item-info"><div class="item-name">${i.n}</div><div class="item-price">$${pr}</div>${sp}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="chgD('${esc(i.n)}',-1)" ${q===0?'style="opacity:.3"':''}>−</button>
          <div class="qty-num">${q||''}</div>
          <button class="qty-btn plus" onclick="chgD('${esc(i.n)}',1)">+</button>
        </div></div>`;
    });
  });
  document.getElementById('drinkMenu').innerHTML=h;
}

function chgF(n,p,d){ const q=Math.max(0,(myFood[n]||0)+d); if(q===0) delete myFood[n]; else myFood[n]=q; renderFM();updateCart(); }
function setDS(n,sk,pr){ if(!myDrink[n]) myDrink[n]={qty:0,size:sk,price:pr}; else{myDrink[n].size=sk;myDrink[n].price=pr;} renderDM();updateCart(); }
function chgD(n,d){
  let item; DM[curDS].forEach(c=>c.items.forEach(i=>{if(i.n===n)item=i;})); if(!item) return;
  const cur=myDrink[n]||{qty:0}; const q=Math.max(0,cur.qty+d);
  if(q===0){ delete myDrink[n]; }
  else if(!myDrink[n]){ const sk=Object.keys(item.s||{})[0]||''; myDrink[n]={qty:q,size:sk,price:item.p||item.s?.[sk]||0}; }
  else myDrink[n].qty=q;
  renderDM();updateCart();
}

// ══════════════════════════════════════════
// CART
// ══════════════════════════════════════════
function calcTotal(){
  let t=0;
  FM[curFS].forEach(c=>c.items.forEach(i=>{if(myFood[i.n])t+=i.p*myFood[i.n];}));
  Object.values(myDrink).forEach(o=>t+=(o.price||0)*o.qty);
  return t;
}
function countItems(){ return Object.values(myFood).reduce((a,b)=>a+b,0)+Object.values(myDrink).reduce((a,b)=>a+b.qty,0); }
function updateCart(){
  if(curTab==='summary') return;
  const c=countItems(),t=calcTotal(),bar=document.getElementById('cartBar');
  if(c>0){ bar.style.display='flex'; document.getElementById('cartInfo').textContent=`已選 ${c} 項`; document.getElementById('cartTotal').textContent=`$${t}`; }
  else bar.style.display='none';
}

// ══════════════════════════════════════════
// CONFIRM / SUBMIT
// ══════════════════════════════════════════
function openConfirm(){
  let h='';
  FM[curFS].forEach(c=>c.items.forEach(i=>{if(myFood[i.n]) h+=`<div class="confirm-item"><span>🍜 ${i.n} ×${myFood[i.n]}</span><span>$${i.p*myFood[i.n]}</span></div>`;}));
  Object.entries(myDrink).forEach(([k,o])=>{h+=`<div class="confirm-item"><span>🧋 ${k}${o.size?' ('+o.size+')':''} ×${o.qty}</span><span>$${o.price*o.qty}</span></div>`;});
  const fr=document.getElementById('foodRemark').value, dr=document.getElementById('drinkRemark').value;
  if(fr) h+=`<div class="confirm-item" style="color:#888"><span>主食備註</span><span>${fr}</span></div>`;
  if(dr) h+=`<div class="confirm-item" style="color:#888"><span>飲料備註</span><span>${dr}</span></div>`;
  h+=`<div class="confirm-total"><span>合計</span><span class="price">$${calcTotal()}</span></div>`;
  document.getElementById('confirmContent').innerHTML=h;
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirmModal').classList.remove('show'); }

async function submitOrder(){
  const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='送出中...';
  setSyncBar('syncing','⟳ 儲存中...');
  try{
    const order={
      name:myName, foodStore:curFS, drinkStore:curDS,
      food:{...myFood}, drink:JSON.parse(JSON.stringify(myDrink)),
      foodRemark:document.getElementById('foodRemark').value,
      drinkRemark:document.getElementById('drinkRemark').value,
      time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),
      ts:Date.now()
    };
    const key=myName.replace(/[.#$\/\[\]]/g,'_');
    await fbSet(`orders/${TODAY}/${key}`,order);
    closeConfirm(); setSyncBar('ok','✓ 訂單已送出'); showToast('✅ 訂單送出成功！'); updateBadge();
  }catch(e){ setSyncBar('err','⚠️ 送出失敗，請重試'); showToast('❌ 網路錯誤，請再試一次'); }
  btn.disabled=false; btn.textContent='確認送出';
}

function updateBadge(){
  const n=Object.keys(allOrders).length, b=document.getElementById('orderBadge');
  if(n>0){b.style.display='inline';b.textContent=n;}else b.style.display='none';
}
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ══════════════════════════════════════════
// SUMMARY
// ══════════════════════════════════════════
function personTotal(o){
  let t=0;
  FM[o.foodStore]?.forEach(c=>c.items.forEach(i=>{if(o.food?.[i.n])t+=i.p*o.food[i.n];}));
  Object.values(o.drink||{}).forEach(d=>t+=d.price*d.qty);
  return t;
}

function renderSummary(){
  const isAdmin=document.getElementById('adminToggle').checked;
  const orders=Object.values(allOrders||{});
  const container=document.getElementById('summaryContent');
  if(orders.length===0){ container.innerHTML=`<div class="empty-state"><span class="emoji">🍽️</span>今天還沒有人點餐<br><small>訂單將即時顯示</small></div>`; return; }
  const myKey=myName.replace(/[.#$\/\[\]]/g,'_');
  const myOrd=allOrders[myKey];
  let h='';

  // My order card
  if(myOrd){
    const sub=personTotal(myOrd);
    h+=`<div class="summary-card"><h3>✅ 我的訂單<span style="font-size:11px;color:var(--text3);margin-left:auto">${myOrd.time}</span></h3>`;
    FM[myOrd.foodStore]?.forEach(c=>c.items.forEach(i=>{ if(myOrd.food?.[i.n]){ const a=i.p*myOrd.food[i.n]; h+=`<div class="order-row"><span class="order-name">🍜 ${i.n} ×${myOrd.food[i.n]}</span><span class="order-price">$${a}</span></div>`; }}));
    if(myOrd.foodRemark) h+=`<div class="order-row"><span style="color:var(--text3);font-size:13px">備註：${myOrd.foodRemark}</span></div>`;
    Object.entries(myOrd.drink||{}).forEach(([k,o])=>{ const a=o.price*o.qty; h+=`<div class="order-row"><span class="order-name">🧋 ${k}${o.size?' ('+o.size+')':''} ×${o.qty}</span><span class="order-price">$${a}</span></div>`; });
    if(myOrd.drinkRemark) h+=`<div class="order-row"><span style="color:var(--text3);font-size:13px">備註：${myOrd.drinkRemark}</span></div>`;
    h+=`<div class="total-row"><span>個人小計</span><span class="total-amount">$${sub}</span></div></div>`;
  } else {
    h+=`<div class="empty-state"><span class="emoji">📝</span>你今天還沒點餐！</div>`;
  }

  if(!isAdmin){ container.innerHTML=h; return; }

  // Admin: food aggregation
  [...new Set(orders.map(o=>o.foodStore))].forEach(store=>{
    const so=orders.filter(o=>o.foodStore===store); const agg={};
    so.forEach(o=>Object.entries(o.food||{}).forEach(([k,q])=>{agg[k]=(agg[k]||0)+q;}));
    if(!Object.keys(agg).length) return;
    h+=`<div class="summary-card"><h3>🍜 ${store} 彙整（${so.length}人）</h3>`;
    let t=0;
    FM[store]?.forEach(c=>c.items.forEach(i=>{ if(agg[i.n]){ const a=i.p*agg[i.n]; t+=a;
      const ps=so.filter(o=>o.food?.[i.n]).map(o=>o.name).join('、');
      h+=`<div class="order-row"><div><span class="order-name">${i.n} ×${agg[i.n]}</span><br><span class="order-person">→ ${ps}</span></div><span class="order-price">$${a}</span></div>`; }}));
    const rems=so.filter(o=>o.foodRemark).map(o=>`${o.name}：${o.foodRemark}`).join('；');
    if(rems) h+=`<div class="order-row"><span style="font-size:12px;color:var(--text3)">備註｜${rems}</span></div>`;
    h+=`<div class="total-row"><span>主食小計</span><span class="total-amount">$${t}</span></div></div>`;
  });

  // Admin: drink aggregation
  [...new Set(orders.map(o=>o.drinkStore))].forEach(store=>{
    const so=orders.filter(o=>o.drinkStore===store); const agg={};
    so.forEach(o=>Object.entries(o.drink||{}).forEach(([k,v])=>{ const key=`${k}${v.size?' ('+v.size+')':''}`;
      if(!agg[key]) agg[key]={qty:0,price:v.price}; agg[key].qty+=v.qty; }));
    if(!Object.keys(agg).length) return;
    h+=`<div class="summary-card"><h3>🧋 ${store} 彙整</h3>`;
    let t=0;
    Object.entries(agg).forEach(([k,v])=>{ const a=v.price*v.qty; t+=a;
      h+=`<div class="order-row"><span class="order-name">${k} ×${v.qty}</span><span class="order-price">$${a}</span></div>`; });
    const rems=so.filter(o=>o.drinkRemark).map(o=>`${o.name}：${o.drinkRemark}`).join('；');
    if(rems) h+=`<div class="order-row"><span style="font-size:12px;color:var(--text3)">備註｜${rems}</span></div>`;
    h+=`<div class="total-row"><span>飲料小計</span><span class="total-amount">$${t}</span></div></div>`;
  });

  // Admin: per person total
  h+=`<div class="summary-card"><h3>💰 個人金額統計</h3>`;
  let grand=0;
  orders.forEach(o=>{ const pt=personTotal(o); grand+=pt;
    h+=`<div class="order-row"><span class="order-name">${o.name} <span style="font-size:11px;color:var(--text3)">${o.time}</span></span><span class="order-price">$${pt}</span></div>`; });
  h+=`<div class="total-row"><span>今日總計</span><span class="total-amount">$${grand}</span></div></div>`;
  h+=`<button class="btn-primary" onclick="exportText()" style="margin-bottom:16px">📋 複製 Line 訊息給店家</button>`;
  container.innerHTML=h;
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportText(){
  const orders=Object.values(allOrders||{});
  let txt=`📋 今日午餐訂單\n${'─'.repeat(20)}\n`;
  [...new Set(orders.map(o=>o.foodStore))].forEach(store=>{
    txt+=`\n🍜 ${store}\n`; const agg={};
    orders.filter(o=>o.foodStore===store).forEach(o=>Object.entries(o.food||{}).forEach(([k,q])=>{agg[k]=(agg[k]||0)+q;}));
    FM[store]?.forEach(c=>c.items.forEach(i=>{if(agg[i.n]) txt+=`  ${i.n} ×${agg[i.n]}\n`;}));
    const r=orders.filter(o=>o.foodStore===store&&o.foodRemark).map(o=>`${o.name}：${o.foodRemark}`);
    if(r.length) txt+=`  備註：${r.join('；')}\n`;
  });
  [...new Set(orders.map(o=>o.drinkStore))].forEach(store=>{
    txt+=`\n🧋 ${store}\n`; const agg={};
    orders.filter(o=>o.drinkStore===store).forEach(o=>Object.entries(o.drink||{}).forEach(([k,v])=>{
      const key=`${k}${v.size?' ('+v.size+')':''}`; agg[key]=(agg[key]||0)+v.qty; }));
    Object.entries(agg).forEach(([k,q])=>{txt+=`  ${k} ×${q}\n`;});
    const r=orders.filter(o=>o.drinkStore===store&&o.drinkRemark).map(o=>`${o.name}：${o.drinkRemark}`);
    if(r.length) txt+=`  備註：${r.join('；')}\n`;
  });
  txt+=`\n${'─'.repeat(20)}\n`;
  orders.forEach(o=>{ txt+=`${o.name}：$${personTotal(o)}\n`; });
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ 已複製！貼到 Line 傳給店家'));
}
</script>
